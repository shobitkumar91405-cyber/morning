<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌷 Flower for Tanushka</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfbfb 100%);
            overflow: hidden; /* Prevents scrollbars from hearts */
            height: 100vh;
            position: relative;
        }
        
        /* Optimized Floating Hearts */
        .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .heart { 
            position: absolute; 
            color: #ff69b4; 
            font-size: 24px; 
            opacity: 0;
            will-change: transform, opacity; /* Fixes Lag */
            animation: floatHeart linear forwards; 
        }
        @keyframes floatHeart {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }
        
        /* Intro Screen */
        .intro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.8s ease; /* Fixed sudden jump */
        }
        .intro h1 {
            font-size: 3.5em;
            color: #d63384;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(214, 51, 132, 0.3);
            animation: gentleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes gentleGlow {
            from { text-shadow: 0 0 10px rgba(255, 105, 180, 0.4); transform: scale(1); }
            to { text-shadow: 0 0 20px rgba(255, 20, 147, 0.8); transform: scale(1.02); }
        }

        /* ----------------------------------- */
        /* REALISTIC FLOWER CSS                */
        /* ----------------------------------- */
        .flower-wrapper {
            position: relative;
            width: 300px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .stem {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 150px;
            background: linear-gradient(to right, #2e8b57, #3cb371, #2e8b57);
            border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            opacity: 0;
            animation: growStem 2s forwards 0.5s;
        }
        .leaf {
            position: absolute;
            bottom: 50px;
            width: 60px;
            height: 40px;
            background: linear-gradient(45deg, #2e8b57, #3cb371);
            border-radius: 0 50px 0 50px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            opacity: 0;
        }
        .leaf-left { right: 50%; transform-origin: bottom right; animation: growLeaf 1.5s forwards 1.5s; transform: rotate(-30deg) scale(0); }
        .leaf-right { left: 50%; border-radius: 50px 0 50px 0; transform-origin: bottom left; animation: growLeaf 1.5s forwards 1.8s; transform: rotate(30deg) scale(0); }
        
        .flower-head {
            position: absolute;
            top: 100px;
            width: 200px;
            height: 200px;
            z-index: 5;
        }
        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50% 50% 20% 80% / 50% 80% 20% 50%; /* Realistic petal shape */
            transform-origin: bottom left;
            box-shadow: inset 5px 5px 15px rgba(255,255,255,0.5), inset -5px -5px 20px rgba(0,0,0,0.2), 2px 5px 10px rgba(0,0,0,0.1);
            opacity: 0;
        }
        
        /* Layer 1 (Outer - Large) */
        .layer-1 .petal {
            width: 90px; height: 110px;
            margin-top: -110px; margin-left: -45px;
            background: linear-gradient(135deg, #ff1493, #ff69b4, #ffb6c1);
            animation: bloomRealistic 2.5s ease-out forwards;
        }
        /* Layer 2 (Middle - Medium) */
        .layer-2 .petal {
            width: 75px; height: 95px;
            margin-top: -95px; margin-left: -37.5px;
            background: linear-gradient(135deg, #d63384, #ff1493, #ff69b4);
            animation: bloomRealistic 2s ease-out forwards;
        }
        /* Layer 3 (Inner - Small) */
        .layer-3 .petal {
            width: 55px; height: 75px;
            margin-top: -75px; margin-left: -27.5px;
            background: linear-gradient(135deg, #c2185b, #d63384, #ff1493);
            animation: bloomRealistic 1.5s ease-out forwards;
        }

        .flower-center {
            position: absolute;
            top: 50%; left: 50%;
            width: 40px; height: 40px;
            margin-top: -20px; margin-left: -20px;
            background: radial-gradient(circle, #ffed4e, #ffa500);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), inset 0 0 10px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeInCenter 1s forwards 4s;
            z-index: 10;
        }

        @keyframes growStem { from { height: 0; opacity: 0; } to { height: 150px; opacity: 1; } }
        @keyframes growLeaf { from { transform: scale(0) rotate(var(--rot)); opacity: 0; } to { transform: scale(1) rotate(var(--rot)); opacity: 1; } }
        @keyframes fadeInCenter { to { opacity: 1; } }
        
        @keyframes bloomRealistic {
            0% { opacity: 0; transform: rotate(var(--angle)) scale(0) translateY(20px); }
            100% { opacity: 1; transform: rotate(var(--angle)) scale(1) translateY(0); }
        }
        /* ----------------------------------- */

        .ntmy {
            font-size: 2.5em;
            color: #ff1493;
            font-weight: bold;
            margin-top: 20px;
            opacity: 0;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 4.5s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.5) translateY(20px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .next-btn {
            margin-top: 40px;
            padding: 15px 45px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: popIn 1s forwards 5s;
        }
        .next-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.5);
        }
        
        /* Card Screen */
        .card-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 20;
        }
        .card-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .love-card {
            width: 340px;
            height: 480px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.3);
            cursor: pointer;
            position: relative;
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 5px solid #ffe4e1;
        }
        .love-card:hover { transform: scale(0.95); }
        
        .love-card.open {
            transform: scale(1);
            box-shadow: 0 30px 60px rgba(255, 20, 147, 0.4);
            border-color: #ffb6c1;
        }
        
        .card-cover {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            font-weight: bold;
            transition: transform 0.8s ease-in-out;
            transform-origin: top;
            z-index: 2;
        }
        .love-card.open .card-cover {
            transform: rotateX(100deg);
            opacity: 0;
        }
        
        .card-content {
            padding: 40px 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 0.3s;
        }
        .love-card.open .card-content {
            opacity: 1;
            transform: translateY(0);
        }
        .card-title {
            font-size: 2.2em;
            color: #d63384;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .card-msg {
            font-size: 1.3em;
            color: #555;
            line-height: 1.6;
            font-family: 'Arial', sans-serif;
        }
        .card-msg strong { color: #ff1493; }

        @media (max-width: 768px) {
            .intro h1 { font-size: 2.5em; }
            .flower-wrapper { transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="intro" id="intro">
        <h1>Hi Tanushka i am sivasingh I made this 🌷 for you💕</h1>
        
        <div class="flower-wrapper">
            <div class="stem"></div>
            <div class="leaf leaf-left" style="--rot: -30deg;"></div>
            <div class="leaf leaf-right" style="--rot: 30deg;"></div>
            
            <div class="flower-head">
                <div class="flower-center"></div>
                <div class="layer-1">
                    <script>
                        for(let i=0; i<8; i++) {
                            document.write(`<div class="petal" style="--angle: ${i * 45}deg; animation-delay: ${0.5 + i*0.1}s;"></div>`);
                        }
                    </script>
                </div>
                <div class="layer-2">
                    <script>
                        for(let i=0; i<6; i++) {
                            document.write(`<div class="petal" style="--angle: ${i * 60 + 15}deg; animation-delay: ${1.5 + i*0.15}s;"></div>`);
                        }
                    </script>
                </div>
                <div class="layer-3">
                    <script>
                        for(let i=0; i<5; i++) {
                            document.write(`<div class="petal" style="--angle: ${i * 72 + 30}deg; animation-delay: ${2.5 + i*0.2}s;"></div>`);
                        }
                    </script>
                </div>
            </div>
        </div>

        <div class="ntmy">Ntmy Tanushka 🌹</div>
        <button class="next-btn" onclick="nextScreen()">Open Letter 💌</button>
    </div>
    
    <div class="card-screen" id="cardScreen">
        <div class="love-card" id="loveCard" onclick="toggleCard()">
            <div class="card-cover">Tap to Open 💖</div>
            <div class="card-content">
                <div class="card-title">💌 For You</div>
                <div class="card-msg">
                    Nice to meet you 🥰<br><br>
                    <strong>Tanushka</strong>, have a beautiful day<br>
                    just like you 🌸💖
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/mpeg">
        </audio>

    <script>
        // Optimized Floating Hearts
        let heartCount = 0;
        const maxHearts = 25; // Prevents lag on mobile

        function createHeart() {
            if (heartCount >= maxHearts) return;
            
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💗', '🌸', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + '%';
            
            const duration = Math.random() * 4 + 5; // 5 to 9 seconds
            heart.style.animationDuration = duration + 's';
            
            document.getElementById('hearts').appendChild(heart);
            heartCount++;
            
            setTimeout(() => {
                heart.remove();
                heartCount--;
            }, duration * 1000);
        }
        
        // Only spawn hearts every 400ms to save CPU
        setInterval(createHeart, 400);

        // Smooth Transition to Card Screen
        function nextScreen() {
            const intro = document.getElementById('intro');
            const cardScreen = document.getElementById('cardScreen');
            
            // Play music
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => console.log("Audio play blocked by browser."));

            // Slide out intro
            intro.style.transform = 'translateY(-100vh) scale(0.8)';
            intro.style.opacity = '0';
            
            setTimeout(() => {
                intro.style.display = 'none';
                cardScreen.classList.add('active');
            }, 800);
        }

        // Card Toggle Animation
        function toggleCard() {
            const card = document.getElementById('loveCard');
            card.classList.toggle('open');
        }
    </script>
</body>
</html>
